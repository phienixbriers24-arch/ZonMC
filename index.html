<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Store</title>
</head>
<body>
    <header>
        <h1>Welcome to the Minecraft Server Store</h1>
    </header>
    <main>
        <section>
            <h2>Available Servers</h2>
            <ul>
                <li><strong>Server 1:</strong> IP - 192.168.1.1</li>
                <li><strong>Server 2:</strong> IP - 192.168.1.2</li>
                <li><strong>Server 3:</strong> IP - 192.168.1.3</li>
            </ul>
        </section>
        <section>
            <h2>Purchase Your Server</h2>
            <form action="#" method="post">
                <label for="server-name">Server Name:</label>
                <input type="text" id="server-name" name="server-name" required>
                <label for="server-ip">Server IP:</label>
                <input type="text" id="server-ip" name="server-ip" required>
                <button type="submit">Buy Now</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Minecraft Server Store</p>
    </footer>
</body>
</html>
